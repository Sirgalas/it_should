<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layouts/header :: header('Ошибка')"></head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand navbar-white navbar-light" th:replace="layouts/topnawbar :: topnavbar ">
    </nav>
    <aside class="main-sidebar sidebar-dark-primary elevation-4" th:replace="layouts/sidebar :: sidebar(${sidebar})"></aside>
    
    <div class="content-wrapper">
        <div class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1 class="m-0 text-danger">Произошла ошибка</h1>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-12">
                        <div class="card card-danger">
                            <div class="card-header">
                                <h3 class="card-title">Детали ошибки</h3>
                            </div>
                            <div class="card-body">
                                <!-- Блок для вывода статуса (например, 404) -->
                                <h4 th:if="${status}" th:text="'Код: ' + ${status}">Код: 500</h4>
                                
                                <!-- Общее сообщение об ошибке -->
                                <p class="lead" th:if="${errorMessage}" th:text="${errorMessage}">Что-то пошло не так.</p>
                                
                                <!-- Вывод ошибок валидации (BindingResult) -->
                                <div th:if="${validationErrors}" class="alert alert-warning">
                                    <h5>Ошибки заполнения формы:</h5>
                                    <ul>
                                        <li th:each="err : ${validationErrors}" th:text="${err}">Поле заполнено неверно</li>
                                    </ul>
                                </div>
                                
                                <a href="/" class="btn btn-primary mt-3">Вернуться на главную</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div>
    <script th:src="@{/webjars/AdminLTE/3.2.0/plugins/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/AdminLTE/3.2.0/plugins/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/webjars/AdminLTE/3.2.0/dist/js/adminlte.min.js}"></script>
</div>
</body>
</html>
